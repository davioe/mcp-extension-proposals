name: Validate Schemas & Manifests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Validate schemas and manifests (ajv)
        run: node scripts/validate-schemas.js

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run Python reference implementation
        run: python examples/python/server.py
        timeout-minutes: 2

      - name: Run TypeScript reference implementation
        run: npx tsx examples/typescript/server.ts
        timeout-minutes: 2

      - name: Run Saga demo (Python)
        run: python examples/python/saga_demo.py
        timeout-minutes: 2

      - name: Run Saga demo (TypeScript)
        run: npx tsx examples/typescript/saga-demo.ts
        timeout-minutes: 2

      - name: Run SSE subscription demo (TypeScript)
        run: npx tsx examples/typescript/sse-subscription-demo.ts
        timeout-minutes: 2

      - name: Run SSE subscription demo (Python)
        run: python examples/python/sse_subscription_demo.py
        timeout-minutes: 2

      - name: Run data reference demo (TypeScript)
        run: npx tsx examples/typescript/data-reference-demo.ts
        timeout-minutes: 2

      - name: Run data reference demo (Python)
        run: python examples/python/data_reference_demo.py
        timeout-minutes: 2
